<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — KI Beratung</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 48px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .telegram-widget {
            display: flex;
            justify-content: center;
            margin: 24px 0;
        }
        .features {
            margin-top: 40px;
            text-align: left;
        }
        .feature {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #555;
        }
        .feature-icon {
            font-size: 20px;
            flex-shrink: 0;
        }
        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🤖</div>
        <h1>KI Beratung</h1>
        <p class="subtitle">Професійна система перекладацького менеджменту</p>

        <!-- Telegram Login Widget -->
        <div class="telegram-widget">
            <script async src="https://telegram.org/js/telegram-widget.js?22"
                    data-telegram-login="aicore_kaminskyibot"
                    data-size="large"
                    data-auth-url="https://bot-production-d5ec.up.railway.app/auth/telegram"
                    data-request-access="write"></script>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div>
                    <strong>Безпечний вхід</strong><br>
                    Авторизація через Telegram без паролів
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div>
                    <strong>Миттєвий доступ</strong><br>
                    Одне натискання для входу в систему
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <div>
                    <strong>Будь-який пристрій</strong><br>
                    Працює на комп'ютері, планшеті та телефоні
                </div>
            </div>
        </div>

        <div class="footer">
            <p>
                Захищено end-to-end шифруванням<br>
                <a href="https://kaminskyi.chat" target="_blank">kaminskyi.chat</a>
            </p>
        </div>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('ki_session_token');
        if (token) {
            // Verify token and redirect to app
            fetch('/api/auth/verify', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(r => r.json())
            .then(data => {
                if (data.valid) {
                    window.location.href = '/app';
                } else {
                    localStorage.removeItem('ki_session_token');
                }
            })
            .catch(() => {
                localStorage.removeItem('ki_session_token');
            });
        }
    </script>
</body>
</html>
